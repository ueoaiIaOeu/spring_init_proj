plugins {
    id 'java'
    id 'war'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework:spring-webmvc:7.0.7'

    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.1.0'
    implementation 'com.mysql:mysql-connector-j:9.7.0'
    implementation 'org.hibernate.orm:hibernate-core:7.4.0.Final'
    implementation 'org.springframework.data:spring-data-jpa:4.1.0-M2'

    implementation 'org.thymeleaf:thymeleaf-spring6:3.1.5.RELEASE'

}

test {
    useJUnitPlatform()
}